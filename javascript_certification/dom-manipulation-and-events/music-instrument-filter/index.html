<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character encoding for proper text rendering -->
    <meta charset="UTF-8" />

    <!-- Ensures responsive behavior on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title displayed in the browser tab -->
    <title>Music Instruments product page</title>

    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <!-- Main page heading -->
    <h1>Student Instruments</h1>

    <main>
      <!--
        Dropdown used to filter instruments by category.
        The value of each option corresponds to categories
        used in the JavaScript dataset.
      -->
      <select class="select-container">
        <option id="all" value="all">All</option>
        <option id="woodwinds" value="woodwinds">Woodwinds</option>
        <option id="brass" value="brass">Brass</option>
        <option id="percussion" value="percussion">Percussion</option>
      </select>

      <!--
        Container where instrument cards are displayed.
        Initially populated with static HTML cards.
        Later dynamically updated by JavaScript filtering logic.
      -->
      <div class="products-container">

        <!-- Woodwinds -->
        <div class="card">
          <h2>Flute</h2>
          <p>$500</p>
        </div>

        <div class="card">
          <h2>Clarinet</h2>
          <p>$200</p>
        </div>

        <div class="card">
          <h2>Oboe</h2>
          <p>$4000</p>
        </div>

        <!-- Brass -->
        <div class="card">
          <h2>Trumpet</h2>
          <p>$200</p>
        </div>

        <div class="card">
          <h2>Trombone</h2>
          <p>$300</p>
        </div>

        <div class="card">
          <h2>French Horn</h2>
          <p>$4300</p>
        </div>

        <!-- Percussion -->
        <div class="card">
          <h2>Drum Set</h2>
          <p>$500</p>
        </div>

        <div class="card">
          <h2>Xylophone</h2>
          <p>$3000</p>
        </div>

        <div class="card">
          <h2>Cymbals</h2>
          <p>$200</p>
        </div>

        <div class="card">
          <h2>Marimba</h2>
          <p>$3000</p>
        </div>

      </div>
    </main>

    <!-- JavaScript controlling filtering logic -->
    <script src="./script.js"></script>
  </body>
</html>
