<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- External stylesheet -->
    <link rel="stylesheet" href="styles.css">

    <title>Real Time Counter</title>
</head>

<body>

    <!-- Page title -->
    <h1 id="title">Real-Time Character Counter</h1>

    <!-- Textarea where users type their text -->
    <textarea rows="5" cols="30" id="text-input" placeholder="Start typing..."></textarea>

    <!-- Displays the current character count -->
    <p id="char-count">Character Count: 0/50</p>

    <!-- JavaScript functionality -->
    <script src="script.js"></script>

</body>
</html>
