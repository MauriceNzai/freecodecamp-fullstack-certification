<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled To-Do List</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main>
    <h1>My To-Do List</h1>
      <ul class="todo-list">
          <li>
              <input type="checkbox" id="gaming-keyboards">
              <label for="gaming-keyboards">
                  Explore Gaming Keyboards
              </label>
              <ul class="sub-item">
                  <li><a class="sub-item-link" href="#" target="_blank">Store Link</a></li>
              </ul>
          </li>
          <li>
              <input type="checkbox" id="finish-report">
              <label for="finish-report">
                  Finish the Report
              </label>
              <ul class="sub-item">
                  <li><a class="sub-item-link" href="#" target="_blank">Request Access</a></li>
              </ul>
          </li>
          <li>
              <input type="checkbox" id="phone-warrant">
              <label for="phone-warrant">
                  View Phone's Warrant
              </label>
              <ul class="sub-item">
                  <li><a class="sub-item-link" href="#" target="_blank">View Receipts</a></li>
              </ul>
          </li>
          <li>
              <input type="checkbox" id="processor-specs">
              <label for="processor-specs">
                  Check Processor Specs
              </label>
              <ul class="sub-item">
                  <li><a class="sub-item-link" href="#"  target="_blank">View Model Number</a></li>
              </ul>
          </li>
      </ul>
    </main>
</body>

</html>
